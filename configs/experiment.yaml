project:
  name: llm-infra-lab
  owner: junyi

model:
  name_or_path: Qwen/Qwen2.5-1.5B-Instruct
  torch_dtype: bfloat16
  trust_remote_code: false

data:
  train_path: data/apps/train.jsonl
  val_path: data/apps/val.jsonl
  max_length: 2048

train:
  output_root: runs
  seed: 42
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.03
  logging_steps: 10
  save_steps: 20
  eval_steps: 20
  save_total_limit: 1
  gradient_checkpointing: false
  bf16: true
  fp16: false
  report_to: none

serving:
  port: 8000
  max_model_len: 4096
  gpu_memory_utilization: 0.9

eval:
  benchmark: humaneval
  temperature: 0.0
  max_tokens: 1024

infra:
  gpu_name: null
  gpu_hourly_cost_usd: 0.77
