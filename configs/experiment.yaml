project:
  name: llm-infra-lab
  owner: junyi

model:
  name_or_path: Qwen/Qwen2.5-1.5B-Instruct
  torch_dtype: bfloat16
  trust_remote_code: false

data:
  variant: apps_taco_mix
  train_path: data/apps/train.jsonl
  val_path: data/apps/val.jsonl
  max_length: 2048
  prompt_style: auto_benchmark_like
  variants:
    apps_default:
      train_path: data/apps/train.jsonl
      val_path: data/apps/val.jsonl
      prompt_style: auto_benchmark_like
    apps_function_only:
      train_path: data/apps_function_only/train.jsonl
      val_path: data/apps_function_only/val.jsonl
      prompt_style: signature_docstring
    taco_verified:
      train_path: data/taco_verified/train.jsonl
      val_path: data/taco_verified/val.jsonl
      prompt_style: auto_benchmark_like
    taco_function_only:
      train_path: data/taco_function_only/train.jsonl
      val_path: data/taco_function_only/val.jsonl
      prompt_style: signature_docstring
    apps_taco_mix:
      train_path: data/apps_taco_mix/train.jsonl
      val_path: data/apps_taco_mix/val.jsonl
      prompt_style: auto_benchmark_like

train:
  output_root: runs
  seed: 42
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 32
  learning_rate: 2.0e-6
  weight_decay: 0.01
  warmup_ratio: 0.03
  logging_steps: 10
  save_steps: 20
  eval_steps: 20
  save_total_limit: 1
  gradient_checkpointing: true
  bf16: true
  fp16: false
  report_to: none

serving:
  port: 8000
  max_model_len: 4096
  gpu_memory_utilization: 0.9

eval:
  benchmark: humaneval
  temperature: 0.0
  max_tokens: 1024

infra:
  gpu_name: null
  gpu_hourly_cost_usd: 0.77
